<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="loginNetworkTitle loginNetworkDesc">
  <title id="loginNetworkTitle">Sri Lanka digital network illustration</title>
  <desc id="loginNetworkDesc">Stylised outline of Sri Lanka surrounded by data nodes and charts on a dark gradient background.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#051530" />
      <stop offset="45%" stop-color="#062752" />
      <stop offset="100%" stop-color="#0b4476" />
    </linearGradient>
    <radialGradient id="radialGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4cc9ff" stop-opacity="0.9" />
      <stop offset="45%" stop-color="#2a7ce5" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0a1c33" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feBlend in="SourceGraphic" in2="blur" mode="screen" />
    </filter>
  </defs>
  <rect width="1600" height="1200" fill="url(#bgGradient)" />
  <rect width="1600" height="1200" fill="url(#radialGlow)" />

