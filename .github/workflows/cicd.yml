name: CI/CD

permissions:
  contents: read

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare CI database path
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SESSION_DRIVER: file
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-ingest.txt

      - name: Run tests
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync
          MAIL_MAILER: log
        run: |
          php artisan migrate --force
          php artisan test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          [ -n "$DEPLOY_HOST" ] || { echo "Missing secret: DEPLOY_HOST"; exit 1; }
          [ -n "$DEPLOY_USER" ] || { echo "Missing secret: DEPLOY_USER"; exit 1; }
          [ -n "$DEPLOY_PORT" ] || { echo "Missing secret: DEPLOY_PORT"; exit 1; }
          [ -n "$DEPLOY_PATH" ] || { echo "Missing secret: DEPLOY_PATH"; exit 1; }
          [ -n "$DEPLOY_SSH_KEY" ] || { echo "Missing secret: DEPLOY_SSH_KEY"; exit 1; }

      - name: Deploy via SSH
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          debug: true
          script_stop: true
          command_timeout: 30m
          envs: GH_REPO,GH_TOKEN
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if ! sudo -n /usr/bin/systemctl is-active php-fpm >/dev/null 2>&1; then
              echo "ERROR: Passwordless sudo is required for DEPLOY_USER in GitHub Actions deploy session."
              echo "Please configure sudoers for systemctl restart/is-active commands."
              exit 1
            fi

            ORIGINAL_REMOTE_URL="$(git remote get-url origin)"
            trap 'git remote set-url origin "$ORIGINAL_REMOTE_URL"' EXIT
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
            git fetch origin main
            git reset --hard origin/main

            if command -v python3.11 >/dev/null 2>&1; then
              PYTHON_BIN="python3.11"
            else
              PYTHON_BIN="python3"
            fi

            rm -rf .venv-deploy
            if $PYTHON_BIN -m venv .venv-deploy >/dev/null 2>&1; then
              . .venv-deploy/bin/activate
              python -m pip install --upgrade pip || true
              PIP_INGEST_STATUS=0
              pip install -r scripts/requirements-ingest.txt || PIP_INGEST_STATUS=1
              PIP_VALIDATOR_STATUS=0
              pip install -r scripts/requirements-validator.txt || PIP_VALIDATOR_STATUS=1

              if [ "$PIP_INGEST_STATUS" -ne 0 ] || [ "$PIP_VALIDATOR_STATUS" -ne 0 ]; then
                echo "WARNING: Python dependency install failed (likely Python version mismatch)."
                echo "WARNING: Deploy will continue, but Python ingest/validator scripts may not run until Python deps are fixed."
              fi
            else
              echo "WARNING: python3 venv setup failed; skipping Python dependency install."
            fi
            
            composer install --no-interaction --prefer-dist --optimize-autoloader
            npm ci
            npm run build
            php artisan migrate --force
            php artisan optimize:clear
            if ! sudo -n /usr/bin/systemctl restart php-fpm; then
              echo "WARNING: Could not restart php-fpm on target host."
            fi
            if ! sudo -n /usr/bin/systemctl restart nginx; then
              echo "WARNING: Could not restart nginx on target host."
            fi
            if ! sudo -n /usr/bin/systemctl restart cdds-queue-exports.service; then
              echo "WARNING: Could not restart cdds-queue-exports.service on target host."
              echo "WARNING: Verify queue service name/sudo policy on server."
            fi
            if ! sudo -n /usr/bin/systemctl is-active php-fpm; then
              echo "WARNING: php-fpm is not active after deploy."
            fi
            if ! sudo -n /usr/bin/systemctl is-active nginx; then
              echo "WARNING: nginx is not active after deploy."
            fi
            if ! sudo -n /usr/bin/systemctl is-active cdds-queue-exports.service; then
              echo "WARNING: cdds-queue-exports.service is not active after deploy."
            fi