name: CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare CI database path
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SESSION_DRIVER: file
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync
          MAIL_MAILER: log
        run: |
          php artisan migrate --force
          php artisan test --no-interaction

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if ! sudo -n true 2>/dev/null; then
              echo "ERROR: Passwordless sudo is required for DEPLOY_USER in GitHub Actions deploy session."
              echo "Please configure sudoers for systemctl restart/is-active commands."
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main
            composer install --no-interaction --prefer-dist --optimize-autoloader
            npm ci
            npm run build
            php artisan migrate --force
            php artisan optimize:clear
            sudo -n systemctl restart php-fpm
            sudo -n systemctl restart nginx
            sudo -n systemctl restart cdds-queue-exports.service
            sudo -n systemctl is-active php-fpm nginx cdds-queue-exports.service